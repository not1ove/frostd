<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FROSTD — The Math v2</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d0d; display: flex; flex-direction: column;
  align-items: center; padding: 16px; gap: 12px;
  font-family: 'JetBrains Mono', monospace; color: #fff;
}
.stage { width: 100%; max-width: 480px; }
.slide {
  container-type: size; container-name: slide;
  width: 100%; aspect-ratio: 3/4;
  position: relative; overflow: hidden;
}

/* NOTEBOOK BACKGROUND */
.notebook-bg {
  position: absolute; inset: 0;
  background-color: #FAFAF5;
  background-image:
    /* red margin line */
    linear-gradient(90deg, transparent 12cqw, #FFB3B3 12cqw, #FFB3B3 calc(12cqw + 1px), transparent calc(12cqw + 1px)),
    /* horizontal ruled lines */
    repeating-linear-gradient(
      180deg,
      transparent,
      transparent calc(8cqw - 1px),
      rgba(180,200,230,0.55) calc(8cqw - 1px),
      rgba(180,200,230,0.55) 8cqw
    );
}

/* Punch holes */
.hole {
  position: absolute;
  left: 5.5cqw;
  width: 2.8cqw; height: 2.8cqw;
  border-radius: 50%;
  background: #0d0d0d;
  border: 1px solid rgba(0,0,0,0.15);
}

.f {
  position: absolute; inset: 0;
  padding: 7cqw 7cqw 7cqw 15cqw;
  display: flex; flex-direction: column;
  justify-content: space-between;
}

.top {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2cqw; letter-spacing: 0.18em;
  color: rgba(10,10,14,0.35);
  display: flex; justify-content: space-between;
}

.equation { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }

.eq-row {
  display: flex; align-items: center; gap: 3cqw;
  padding: 2.8cqw 0;
  border-bottom: 1px solid rgba(10,10,14,0.08);
}
.eq-row:last-child { border-bottom: none; }

.operator {
  font-family: 'Archivo Black', sans-serif;
  font-size: 6.5cqw; color: rgba(10,10,14,0.18);
  min-width: 6.5cqw; text-align: center; line-height: 1;
  flex-shrink: 0;
}

.eq-label { display: flex; flex-direction: column; gap: 1.2cqw; }
.eq-label .big {
  font-family: 'Archivo Black', sans-serif;
  font-size: 7.5cqw; color: #0A0A0E;
  letter-spacing: -0.01em; line-height: 0.88;
}
/* RED PEN energy for supporting text */
.eq-label .small {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2cqw; letter-spacing: 0.12em;
  color: #CC2200;
  font-style: italic;
}

.result-row {
  margin-top: 4cqw; padding-top: 4cqw;
  border-top: 2.5px solid #0A0A0E;
  display: flex; align-items: center; gap: 3cqw;
}
.equals {
  font-family: 'Archivo Black', sans-serif;
  font-size: 6.5cqw; color: #0A0A0E; line-height: 1;
  flex-shrink: 0; min-width: 6.5cqw; text-align: center;
}
.result-label { display: flex; flex-direction: column; gap: 1.2cqw; }
.result-label .wordmark {
  font-family: 'Archivo Black', sans-serif;
  font-size: 12cqw; color: #1E5BFF;
  letter-spacing: -0.02em; line-height: 0.85;
}
.result-label .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.9cqw; letter-spacing: 0.14em;
  color: rgba(10,10,14,0.4);
}

.bottom {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.8cqw; letter-spacing: 0.2em;
  color: rgba(10,10,14,0.3);
  display: flex; justify-content: space-between;
}

.actions { display: flex; gap: 8px; width: 100%; max-width: 480px; }
.save-btn {
  flex: 1; background: #1E5BFF; color: white; border: none;
  padding: 14px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.15em; cursor: pointer; border-radius: 2px;
}
</style>
</head>
<body>

<div class="stage">
  <div class="slide">
    <div class="notebook-bg"></div>

    <!-- punch holes -->
    <div class="hole" style="top: 18cqw;"></div>
    <div class="hole" style="top: 50cqw;"></div>
    <div class="hole" style="top: 82cqw;"></div>

    <div class="f">
      <div class="top">
        <span>@frostd.in</span>
        <span>MUMBAI 2026</span>
      </div>

      <div class="equation">
        <div class="eq-row">
          <div class="operator"></div>
          <div class="eq-label">
            <div class="big">ICE CREAM</div>
            <div class="small">// the kind that never did anything for you</div>
          </div>
        </div>
        <div class="eq-row">
          <div class="operator">+</div>
          <div class="eq-label">
            <div class="big">ALCOHOL</div>
            <div class="small">// real spirits. frozen in.</div>
          </div>
        </div>
        <div class="eq-row">
          <div class="operator">+</div>
          <div class="eq-label">
            <div class="big">NO RULES</div>
            <div class="small">// no permissions asked.</div>
          </div>
        </div>

        <div class="result-row">
          <div class="equals">=</div>
          <div class="result-label">
            <div class="wordmark">FROSTD</div>
            <div class="sub">alcoholic gelato · mumbai only · frostd.in</div>
          </div>
        </div>
      </div>

      <div class="bottom">
        <span>DROPS ONLY</span>
        <span>JOIN THE LIST AT FROSTD.IN</span>
      </div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="save-btn" id="save">↓ SAVE POST</button>
</div>

<script>
document.getElementById('save').addEventListener('click', async () => {
  const el = document.querySelector('.slide');
  const btn = document.getElementById('save');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const canvas = await html2canvas(el, { scale: 3, useCORS: true, backgroundColor: null, logging: false });
    const a = document.createElement('a');
    a.download = 'frostd-the-math-notebook.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    btn.textContent = '✓ SAVED';
    setTimeout(() => { btn.textContent = '↓ SAVE POST'; btn.disabled = false; }, 1200);
  } catch(e) {
    btn.textContent = 'ERROR';
    setTimeout(() => { btn.textContent = '↓ SAVE POST'; btn.disabled = false; }, 1500);
  }
});
</script>
</body>
</html>
